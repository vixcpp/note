<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Vix Note is a visual executable note workspace for learning C++ and Vix.cpp faster."
    />

    <title>Vix Note</title>

    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f37726'/%3E%3Cpath d='M18 14h10l7 23 7-23h10L40 50H30L18 14z' fill='white'/%3E%3C/svg%3E"
    />

    <link rel="stylesheet" href="/assets/note.css" />
  </head>

  <body>
    <div class="vn" data-note-app data-kernel="idle">
      <!-- ============ TOP APP BAR (global, minimal) ============ -->
      <header class="vn-AppBar">
        <div class="vn-AppBar__brand">
          <span class="vn-AppBar__logo" aria-hidden="true">V</span>
          <span class="vn-AppBar__title">Vix Note</span>
        </div>

        <nav class="vn-AppBar__menus" aria-label="Main menu" data-menubar>
          <div class="vn-Menu" data-menu="file">
            <button type="button" class="vn-Menu__label" data-menu-button>
              File
            </button>
            <div class="vn-Menu__dropdown" role="menu" hidden>
              <button
                type="button"
                class="vn-Menu__item"
                data-command="new-note"
              >
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linejoin="round"
                    d="M13 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V9l-6-6z"
                  />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linejoin="round"
                    d="M13 3v6h6"
                  />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    d="M12 12v5M9.5 14.5h5"
                  />
                </svg>
                New note
              </button>
              <button
                type="button"
                class="vn-Menu__item"
                data-command="open-note"
              >
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linejoin="round"
                    d="M3 7a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v1H3V7z"
                  />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linejoin="round"
                    d="M3 10h18l-2 8a1 1 0 0 1-1 1H6a1 1 0 0 1-1-.8L3 10z"
                  />
                </svg>
                Open note
              </button>
              <button
                type="button"
                class="vn-Menu__item"
                data-command="new-folder"
              >
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linejoin="round"
                    d="M3 6a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6z"
                  />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    d="M12 11v5M9.5 13.5h5"
                  />
                </svg>
                New folder
              </button>
              <div class="vn-Menu__sep"></div>
              <button type="button" class="vn-Menu__item" data-command="save">
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linejoin="round"
                    d="M5 3h11l3 3v15H5V3z"
                  />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linejoin="round"
                    d="M7 3v5h8V3M8 13h8v5H8z"
                  />
                </svg>
                Save note <span class="vn-Menu__hint">⌘S</span>
              </button>
              <button type="button" class="vn-Menu__item" data-command="reload">
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M20 11a8 8 0 1 0-2.3 5.7"
                  />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M20 5v6h-6"
                  />
                </svg>
                Reload from disk
              </button>
            </div>
          </div>

          <div class="vn-Menu" data-menu="edit">
            <button type="button" class="vn-Menu__label" data-menu-button>
              Edit
            </button>
            <div class="vn-Menu__dropdown" role="menu" hidden>
              <button
                type="button"
                class="vn-Menu__item"
                data-command="insert-below"
              >
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <rect
                    x="4"
                    y="4"
                    width="16"
                    height="7"
                    rx="1.5"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                  />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    d="M12 15v5M9.5 17.5h5"
                  />
                </svg>
                Insert cell below <span class="vn-Menu__hint">B</span>
              </button>
              <button
                type="button"
                class="vn-Menu__item"
                data-command="cut-cell"
              >
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M5 7h14M10 7V5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13"
                  />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    d="M10 11v6M14 11v6"
                  />
                </svg>
                Delete selected cell <span class="vn-Menu__hint">D D</span>
              </button>
              <button
                type="button"
                class="vn-Menu__item"
                data-command="duplicate"
              >
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <rect
                    x="9"
                    y="9"
                    width="11"
                    height="11"
                    rx="2"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                  />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M5 15H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v1"
                  />
                </svg>
                Duplicate selected cell
              </button>
              <button
                type="button"
                class="vn-Menu__item"
                data-command="move-up"
              >
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M12 20V8M6 12l6-6 6 6M5 4h14"
                  />
                </svg>
                Move cell up
              </button>
              <button
                type="button"
                class="vn-Menu__item"
                data-command="move-down"
              >
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M12 4v12M6 12l6 6 6-6M5 20h14"
                  />
                </svg>
                Move cell down
              </button>
              <div class="vn-Menu__sep"></div>
              <button type="button" class="vn-Menu__item" data-command="to-cpp">
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M8 8l-4 4 4 4M16 8l4 4-4 4M13.5 5l-3 14"
                  />
                </svg>
                Change to C++ <span class="vn-Menu__hint">Y</span>
              </button>
              <button
                type="button"
                class="vn-Menu__item"
                data-command="to-markdown"
              >
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <rect
                    x="3"
                    y="6"
                    width="18"
                    height="12"
                    rx="2"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                  />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M6 15v-6l2.5 2.5L11 9v6M16 9v5M14 12l2 2 2-2"
                  />
                </svg>
                Change to Markdown <span class="vn-Menu__hint">M</span>
              </button>
              <button
                type="button"
                class="vn-Menu__item"
                data-command="to-reply"
              >
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <rect
                    x="3"
                    y="4"
                    width="18"
                    height="16"
                    rx="2"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                  />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M7 9l3 3-3 3M12.5 15h4"
                  />
                </svg>
                Change to Reply <span class="vn-Menu__hint">R</span>
              </button>
              <button
                type="button"
                class="vn-Menu__item"
                data-command="to-html"
              >
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <rect
                    x="3"
                    y="5"
                    width="18"
                    height="14"
                    rx="2"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                  />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M9 9.5L6.5 12 9 14.5M15 9.5l2.5 2.5L15 14.5"
                  />
                </svg>
                Change to HTML
              </button>
            </div>
          </div>

          <div class="vn-Menu" data-menu="view">
            <button type="button" class="vn-Menu__label" data-menu-button>
              View
            </button>
            <div class="vn-Menu__dropdown" role="menu" hidden>
              <button
                type="button"
                class="vn-Menu__item"
                data-command="show-explorer"
              >
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linejoin="round"
                    d="M3 6a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6z"
                  />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    d="M8 12h8M8 15h5"
                  />
                </svg>
                Show Explorer
              </button>
              <button
                type="button"
                class="vn-Menu__item"
                data-command="show-tabs"
              >
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linejoin="round"
                    d="M3 8a2 2 0 0 1 2-2h5l1.5 2H14V6h5a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8z"
                  />
                </svg>
                Show Open Tabs
              </button>
              <div class="vn-Menu__sep"></div>
              <button
                type="button"
                class="vn-Menu__item"
                data-command="toggle-sidebar"
              >
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <rect
                    x="3"
                    y="4"
                    width="18"
                    height="16"
                    rx="2"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                  />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    d="M9 4v16"
                  />
                </svg>
                Toggle sidebar <span class="vn-Menu__hint">⌘B</span>
              </button>
              <button
                type="button"
                class="vn-Menu__item"
                data-command="toggle-focus"
              >
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <circle
                    cx="12"
                    cy="12"
                    r="3.5"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                  />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    d="M12 3v3M12 18v3M3 12h3M18 12h3"
                  />
                </svg>
                Toggle focus mode
              </button>
            </div>
          </div>

          <div class="vn-Menu" data-menu="run">
            <button type="button" class="vn-Menu__label" data-menu-button>
              Run
            </button>
            <div class="vn-Menu__dropdown" role="menu" hidden>
              <button
                type="button"
                class="vn-Menu__item"
                data-command="run-cell"
              >
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linejoin="round"
                    d="M8 5.5v13l11-6.5-11-6.5z"
                  />
                </svg>
                Run selected cell <span class="vn-Menu__hint">⌘↵</span>
              </button>
              <button
                type="button"
                class="vn-Menu__item"
                data-command="run-advance"
              >
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linejoin="round"
                    d="M5 5v10l8-5-8-5z"
                  />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M18 6v10m-3-3l3 3 3-3"
                  />
                </svg>
                Run and advance <span class="vn-Menu__hint">⇧↵</span>
              </button>
              <button
                type="button"
                class="vn-Menu__item"
                data-command="run-all"
              >
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linejoin="round"
                    d="M5 5.5v13l9-6.5-9-6.5z"
                  />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    d="M18 6v12"
                  />
                </svg>
                Run all cells
              </button>
              <div class="vn-Menu__sep"></div>
              <button
                type="button"
                class="vn-Menu__item"
                data-command="clear-cell"
              >
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M16 4l4 4-9 9H7l-3-3 9-10zM9 10l5 5"
                  />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    d="M11 21h9"
                  />
                </svg>
                Clear selected output
              </button>
              <button
                type="button"
                class="vn-Menu__item"
                data-command="clear-all"
              >
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M15 4l5 5-8 8H8l-4-4 11-9zM9 9l6 6"
                  />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    d="M5 21h14"
                  />
                </svg>
                Clear all outputs
              </button>
              <div class="vn-Menu__sep"></div>
              <button
                type="button"
                class="vn-Menu__item"
                data-command="restart"
              >
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M20 11a8 8 0 1 0-2.3 5.7"
                  />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M20 5v6h-6"
                  />
                </svg>
                Restart kernel
              </button>
              <button
                type="button"
                class="vn-Menu__item"
                data-command="restart-run"
              >
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M16 9a6 6 0 1 0-1.7 4.2"
                  />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M16 4v5h-5"
                  />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linejoin="round"
                    d="M11 15v6l5-3-5-3z"
                  />
                </svg>
                Restart and run all
              </button>
            </div>
          </div>

          <div class="vn-Menu" data-menu="help">
            <button type="button" class="vn-Menu__label" data-menu-button>
              Help
            </button>
            <div class="vn-Menu__dropdown" role="menu" hidden>
              <button
                type="button"
                class="vn-Menu__item"
                data-command="shortcuts"
              >
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <rect
                    x="3"
                    y="6"
                    width="18"
                    height="12"
                    rx="2"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                  />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    d="M7 10h0M11 10h0M15 10h0M8 14h8"
                  />
                </svg>
                Keyboard shortcuts <span class="vn-Menu__hint">?</span>
              </button>
              <div class="vn-Menu__sep"></div>
              <button type="button" class="vn-Menu__item" data-command="about">
                <svg
                  class="vn-Menu__icon"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <circle
                    cx="12"
                    cy="12"
                    r="9"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                  />
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    d="M12 11v5"
                  />
                  <circle cx="12" cy="7.8" r="1" fill="currentColor" />
                </svg>
                About Vix Note
              </button>
            </div>
          </div>
        </nav>

        <div class="vn-AppBar__spacer"></div>

        <div class="vn-AppBar__status">
          <span class="vn-KernelName" data-note-project>No project</span>
          <span class="vn-KernelStatus" title="Kernel status">
            <span class="vn-KernelStatus__dot"></span>
            <span class="vn-KernelStatus__text" data-note-kernel>Idle</span>
          </span>
        </div>
      </header>

      <!-- ============ BODY: activity bar + sidebar + editor ============ -->
      <div class="vn-Body">
        <!-- ACTIVITY BAR (VS Code style vertical rail) -->
        <nav class="vn-Activity" aria-label="Activity bar">
          <button
            class="vn-Activity__btn is-active"
            type="button"
            data-activity="explorer"
            title="Explorer"
            aria-label="Explorer"
          >
            <!-- files / explorer (solid) -->
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M6 2h7l5 5v13a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm7 1.5V8h4.5L13 3.5z"
              />
            </svg>
          </button>
          <button
            class="vn-Activity__btn"
            type="button"
            data-activity="tabs"
            title="Open tabs"
            aria-label="Open tabs"
          >
            <!-- open tabs (solid) -->
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M3 8a2 2 0 0 1 2-2h5l1.5 2H19a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8zm0-2.2V6h6.3L8.4 4.6A2 2 0 0 0 6.8 4H5a2 2 0 0 0-2 1.8z"
              />
            </svg>
          </button>

          <div class="vn-Activity__spacer"></div>

          <button
            class="vn-Activity__btn"
            type="button"
            data-action="shortcuts"
            title="Keyboard shortcuts"
            aria-label="Keyboard shortcuts"
          >
            <!-- keyboard (stroke) -->
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect
                x="3"
                y="6"
                width="18"
                height="12"
                rx="2"
                fill="none"
                stroke="currentColor"
                stroke-width="1.7"
              />
              <path
                fill="none"
                stroke="currentColor"
                stroke-width="1.7"
                stroke-linecap="round"
                d="M7 10h0M11 10h0M15 10h0M8 14h8"
              />
            </svg>
          </button>
        </nav>

        <!-- SIDEBAR (resizable) -->
        <aside class="vn-Sidebar" aria-label="Sidebar" data-sidebar>
          <div class="vn-Sidebar__inner">
            <!-- EXPLORER PANEL -->
            <section class="vn-Panel" data-panel="explorer">
              <header class="vn-Panel__head">
                <span class="vn-Panel__title">
                  Explorer
                  <span class="vn-Panel__count" data-explorer-count>0</span>
                </span>
                <div class="vn-Panel__actions">
                  <button
                    type="button"
                    class="vn-IconBtn"
                    data-action="new-note"
                    title="New note"
                    aria-label="New note"
                  >
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.7"
                        stroke-linejoin="round"
                        d="M13 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V9l-6-6z"
                      />
                      <path
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.7"
                        stroke-linejoin="round"
                        d="M13 3v6h6"
                      />
                      <path
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.7"
                        stroke-linecap="round"
                        d="M12 12v5M9.5 14.5h5"
                      />
                    </svg>
                  </button>
                  <button
                    type="button"
                    class="vn-IconBtn"
                    data-action="new-folder"
                    title="New folder"
                    aria-label="New folder"
                  >
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.7"
                        stroke-linejoin="round"
                        d="M3 6a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6z"
                      />
                      <path
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.7"
                        stroke-linecap="round"
                        d="M12 11v5M9.5 13.5h5"
                      />
                    </svg>
                  </button>
                  <button
                    type="button"
                    class="vn-IconBtn"
                    data-action="open-note"
                    title="Open note"
                    aria-label="Open note"
                  >
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.7"
                        stroke-linejoin="round"
                        d="M3 7a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v1H3V7z"
                      />
                      <path
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.7"
                        stroke-linejoin="round"
                        d="M3 10h18l-2 8a1 1 0 0 1-1 1H6a1 1 0 0 1-1-.8L3 10z"
                      />
                    </svg>
                  </button>
                  <button
                    type="button"
                    class="vn-IconBtn"
                    data-action="refresh"
                    title="Refresh"
                    aria-label="Refresh"
                  >
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.7"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M20 11a8 8 0 1 0-2.3 5.7"
                      />
                      <path
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.7"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M20 5v6h-6"
                      />
                    </svg>
                  </button>
                </div>
              </header>

              <div class="vn-Panel__search">
                <svg
                  viewBox="0 0 24 24"
                  class="vn-Panel__searchIcon"
                  aria-hidden="true"
                >
                  <circle
                    cx="11"
                    cy="11"
                    r="7"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  />
                  <path
                    d="M21 21l-4.35-4.35"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                  />
                </svg>
                <input
                  type="text"
                  data-explorer-search
                  placeholder="Filter notes…"
                  autocomplete="off"
                  spellcheck="false"
                />
              </div>

              <div class="vn-Tree" data-explorer-list aria-label="Files">
                <p class="vn-Tree__empty">No notes yet.</p>
              </div>
            </section>

            <!-- OPEN TABS PANEL -->
            <section class="vn-Panel" data-panel="tabs" hidden>
              <header class="vn-Panel__head">
                <span class="vn-Panel__title">
                  Open Tabs
                  <span class="vn-Panel__count" data-open-tabs-count>0</span>
                </span>
              </header>
              <div class="vn-Tree" data-open-tabs-list aria-label="Open tabs">
                <p class="vn-Tree__empty">No open notes.</p>
              </div>
            </section>
          </div>

          <div
            class="vn-Sidebar__resizer"
            data-sidebar-resizer
            role="separator"
            aria-orientation="vertical"
            aria-label="Resize sidebar"
            tabindex="0"
            title="Drag to resize · double-click to reset"
          ></div>
        </aside>

        <!-- EDITOR COLUMN (tabs + toolbar + notebook) -->
        <div class="vn-Editor-col">
          <!-- CENTER TABS BAR -->
          <div class="vn-TabsBar" data-tabs-bar aria-label="Open note tabs">
            <div class="vn-TabsBar__empty">No open notes</div>
          </div>

          <!-- NOTEBOOK TOOLBAR (scoped to the editor zone) — ICONS UNCHANGED -->
          <div class="vn-Toolbar" role="toolbar" aria-label="Notebook toolbar">
            <button
              class="vn-ToolbarButton"
              type="button"
              data-action="save"
              title="Save (Ctrl/⌘ S)"
              aria-label="Save"
            >
              <svg viewBox="0 0 24 24" class="vn-icon">
                <path d="M5 3h11l3 3v15H5V3zm2 2v4h8V5H7zm0 7v6h10v-6H7z" />
              </svg>
            </button>

            <span class="vn-Toolbar__sep"></span>

            <button
              class="vn-ToolbarButton"
              type="button"
              data-action="insert-below"
              title="Insert cell below (B)"
              aria-label="Insert cell below"
            >
              <svg viewBox="0 0 24 24" class="vn-icon">
                <path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6V5z" />
              </svg>
            </button>

            <button
              class="vn-ToolbarButton"
              type="button"
              data-action="cut-cell"
              title="Delete selected cell (D D)"
              aria-label="Delete cell"
            >
              <svg viewBox="0 0 24 24" class="vn-icon">
                <path d="M6 7h12l-1 14H7L6 7zm3-3h6l1 2H8l1-2z" />
              </svg>
            </button>

            <button
              class="vn-ToolbarButton"
              type="button"
              data-action="duplicate"
              title="Duplicate cell"
              aria-label="Duplicate cell"
            >
              <svg viewBox="0 0 24 24" class="vn-icon">
                <path
                  d="M16 1H4a2 2 0 00-2 2v14h2V3h12V1zm3 4H8a2 2 0 00-2 2v14a2 2 0 002 2h11a2 2 0 002-2V7a2 2 0 00-2-2zm0 16H8V7h11v14z"
                />
              </svg>
            </button>

            <span class="vn-Toolbar__sep"></span>

            <button
              class="vn-ToolbarButton"
              type="button"
              data-action="move-up"
              title="Move cell up"
              aria-label="Move cell up"
            >
              <svg viewBox="0 0 24 24" class="vn-icon">
                <path d="M12 7l6 6-1.4 1.4L12 9.8l-4.6 4.6L6 13l6-6z" />
              </svg>
            </button>

            <button
              class="vn-ToolbarButton"
              type="button"
              data-action="move-down"
              title="Move cell down"
              aria-label="Move cell down"
            >
              <svg viewBox="0 0 24 24" class="vn-icon">
                <path d="M12 17l-6-6 1.4-1.4L12 14.2l4.6-4.6L18 11l-6 6z" />
              </svg>
            </button>

            <span class="vn-Toolbar__sep"></span>

            <button
              class="vn-ToolbarButton"
              type="button"
              data-action="run-cell"
              title="Run selected cell (Ctrl/⌘ Enter)"
              aria-label="Run cell"
            >
              <svg viewBox="0 0 24 24" class="vn-icon">
                <path d="M8 5v14l11-7z" />
              </svg>
            </button>

            <button
              class="vn-ToolbarButton"
              type="button"
              data-action="run-all"
              title="Run all cells"
              aria-label="Run all cells"
            >
              <svg viewBox="0 0 24 24" class="vn-icon">
                <path d="M5 5v14l8-7-8-7zm9 0v14l8-7-8-7z" />
              </svg>
            </button>

            <button
              class="vn-ToolbarButton"
              type="button"
              data-action="restart"
              title="Restart kernel"
              aria-label="Restart"
            >
              <svg viewBox="0 0 24 24" class="vn-icon">
                <path d="M12 6V3L8 7l4 4V8a4 4 0 11-4 4H6a6 6 0 106-6z" />
              </svg>
            </button>

            <span class="vn-Toolbar__sep"></span>

            <div class="vn-CellTypeSelect">
              <select data-action="toolbar-kind" aria-label="Cell type">
                <option value="">Code</option>
                <option value="cpp">C++</option>
                <option value="reply">Reply</option>
                <option value="markdown">Markdown</option>
                <option value="html">HTML</option>
              </select>
            </div>

            <div class="vn-Toolbar__grow"></div>

            <span class="vn-Toolbar__title" data-note-title>Untitled note</span>
            <span class="vn-Toolbar__filename" data-note-document
              >Untitled.vixnote</span
            >
          </div>

          <!-- NOTEBOOK PANEL -->
          <main class="vn-NotebookPanel" id="workspace">
            <div
              class="vn-Notice"
              data-note-message
              hidden
              aria-live="polite"
            ></div>

            <div
              class="vn-Notebook"
              data-note-cells
              aria-label="Vix Note cells"
              tabindex="0"
            >
              <div class="vn-Notebook__loading">
                <span class="vn-spinner" aria-hidden="true"></span>
                Loading note document…
              </div>
            </div>
          </main>
        </div>
      </div>

      <!-- ============ STATUS BAR (fixed-width slots, never reflows) ============ -->
      <footer class="vn-StatusBar" aria-label="Status bar">
        <div class="vn-StatusBar__left">
          <span class="vn-StatusBar__mode" data-status-mode>Command</span>
          <span class="vn-StatusBar__sep">·</span>
          <span class="vn-StatusBar__pos" data-status-position
            >Cell 0 of 0</span
          >
        </div>
        <div class="vn-StatusBar__right">
          <span class="vn-StatusBar__kind" data-status-kind>—</span>
          <span class="vn-StatusBar__sep">·</span>
          <span class="vn-StatusBar__cells">
            <span data-note-cell-count>0</span> cells ·
            <span data-note-exec-count>0</span> run
          </span>
          <span class="vn-StatusBar__sep">·</span>
          <span class="vn-StatusBar__kernel">
            <span class="vn-StatusBar__dot"></span>
            <span class="vn-StatusBar__kernelText" data-status-kernel
              >Idle</span
            >
          </span>
        </div>
      </footer>

      <!-- ============ MODAL (forms / confirm / info) ============ -->
      <div class="vn-Modal" data-modal hidden role="dialog" aria-modal="true">
        <div class="vn-Modal__backdrop" data-modal-close></div>
        <div class="vn-Modal__box">
          <header class="vn-Modal__head">
            <span class="vn-Modal__icon" data-modal-icon aria-hidden="true">
              <!-- default modal icon: info; JS may swap this -->
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle
                  cx="12"
                  cy="12"
                  r="9"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.7"
                />
                <path
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                  d="M12 11v5"
                />
                <circle cx="12" cy="7.8" r="1" fill="currentColor" />
              </svg>
            </span>
            <h2 class="vn-Modal__title" data-modal-title>Title</h2>
            <button
              type="button"
              class="vn-Modal__close"
              data-modal-close
              aria-label="Close"
            >
              ×
            </button>
          </header>
          <div class="vn-Modal__body" data-modal-body></div>
          <footer class="vn-Modal__foot" data-modal-foot></footer>
        </div>
      </div>
    </div>

    <script src="/assets/note.js"></script>
  </body>
</html>
